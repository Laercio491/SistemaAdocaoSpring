<!DOCTYPE html>
<html lang="pt-br">

<head>

    <meta charset="UTF-8">

    <title>
        Agendamento
    </title>

    <link rel="stylesheet" href="style.css">

</head>

<body>

    <header>

        <h1>
            Agendamento de Visita
        </h1>

    </header>
    <button onclick="window.location.href='/cliente.html'">Voltar</button>

    <section class="formulario">

        <form id="formVisita">

            <h2>
                Dados do Adotante
            </h2>

            <label>
                Nome
            </label>

            <input type="text" id="nome" required>

            <label>
                CPF
            </label>

            <input type="text" id="cpf" required>

            <label>
                Telefone
            </label>

            <input type="text" id="telefone" required>

            <label>
                Endereço
            </label>

            <input type="text" id="endereco" required>

            <hr>
            <br>

            <h2>
                Dados da Visita
            </h2>

            <label>
                Animal
            </label>

            <select id="animal" required>

                <option value="">
                    Selecione um animal
                </option>

            </select>

            <label>
                Data da Visita
            </label>

            <input type="date" id="data" required>

            <button type="submit">

                Agendar Visita

            </button>

        </form>

    </section>

    <script>

        const API = "https://sistemaadocaospring.onrender.com";

        const selectAnimal =
            document.getElementById("animal");

        async function carregarAnimais() {

            try {

                const resposta =
                    await fetch(`${API}/animais`);

                if (!resposta.ok) {

                    throw "Erro ao carregar animais";

                }

                const animais =
                    await resposta.json();

                animais.forEach(animal => {

                    let option =
                        document.createElement("option");

                    option.value =
                        animal.idAnimal;

                    option.text =
                        animal.nome + " - " + animal.raca;

                    selectAnimal.appendChild(option);

                });

            } catch (erro) {

                alert(erro);

            }

        }

        document
            .getElementById("formVisita")
            .addEventListener("submit",

                async function (event) {

                    event.preventDefault();

                    try {

                        let nome =
                            document.getElementById("nome").value;

                        let cpf =
                            document.getElementById("cpf").value;

                        let telefone =
                            document.getElementById("telefone").value;

                        let endereco =
                            document.getElementById("endereco").value;

                        let idAnimal =
                            document.getElementById("animal").value;

                        let dataVisita =
                            document.getElementById("data").value;

                        if (
                            !nome ||
                            !cpf ||
                            !telefone ||
                            !endereco ||
                            !idAnimal ||
                            !dataVisita
                        ) {

                            throw "Preencha todos os campos";

                        }

                        // CADASTRAR ADOTANTE

                        let novoAdotante = {

                            nome: nome,
                            cpf: cpf,
                            telefone: telefone,
                            endereco: endereco

                        };

                        const respostaAdotante =
                            await fetch(`${API}/adotantes`, {

                                method: "POST",

                                headers: {
                                    "Content-Type": "application/json"
                                },

                                body: JSON.stringify(novoAdotante)

                            });

                        if (!respostaAdotante.ok) {

                            throw "Erro ao cadastrar adotante";

                        }

                        const adotanteSalvo =
                            await respostaAdotante.json();

                        console.log(adotanteSalvo);

                        // CADASTRAR VISITA

                        let novaVisita = {

                            dataVisita: dataVisita,

                            animal: {
                                idAnimal: Number(idAnimal)
                            },

                            adotante: {
                                idadotante: adotanteSalvo.idadotante
                            }

                        };

                        console.log(JSON.stringify(novaVisita));

                        const respostaVisita =
                            await fetch(`${API}/visitas`, {

                                method: "POST",

                                headers: {
                                    "Content-Type": "application/json"
                                },

                                body: JSON.stringify(novaVisita)

                            });

                        if (!respostaVisita.ok) {

                            throw "Erro ao cadastrar visita";

                        }

                        const visitaSalva =
                            await respostaVisita.json();

                        console.log(visitaSalva);
                        alert(

                            "Cadastro realizado com sucesso!\n\n" +

                            "ID Adotante: " +
                            adotanteSalvo.idadotante + "\n" +

                            "ID Visita: " +
                            visitaSalva.nome

                        );

                        window.location.href =
                            "cliente.html";

                    } catch (erro) {

                        console.log(erro);

                        alert(
                            "Erro: " + erro
                        );

                    }

                });

        carregarAnimais();

    </script>

</body>

</html>
